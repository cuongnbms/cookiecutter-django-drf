x-default: &default
    networks:
        - {{cookiecutter.project_slug}}-net
    restart: always
    logging:
        driver: "json-file"
        options:
            max-size: "10M"
            max-file: "3"

volumes:
{%- if cookiecutter.use_postgres == "y" %}
    postgres-data:
{%- endif %}
    redis-data:

networks:
    {{cookiecutter.project_slug}}-net:

services:

    # {{cookiecutter.project_slug}}:
    #     << : *default
    #     build: .
    #     image: {{cookiecutter.project_slug}}:{{cookiecutter.version}}
    #     ports:
    #         - "127.0.0.1:8000:8000"
    #     hostname: {{cookiecutter.project_slug}}
    #     environment:
    #         DJANGO_SETTINGS_MODULE: 'config.settings'
    #     # command: /usr/local/bin/gunicorn config.wsgi:application -w 2 -b :8000
    #     # command: python3 manage.py runserver 0.0.0.0:8000

{%- if cookiecutter.use_postgres == "y" %}

    postgres:
        << : *default
        image: postgres:16
        container_name: {{cookiecutter.project_slug}}-postgres
        hostname: postgres
        ports:
            - "127.0.0.1:5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data/
        environment:
            - POSTGRES_DB={{cookiecutter.project_slug}}
            - POSTGRES_USER=dev
            - POSTGRES_PASSWORD=dev
{%- endif %}

    redis:
        <<: *default
        image: redis:7
        ports:
            - "127.0.0.1:6379:6379"
        hostname: redis
        container_name: {{cookiecutter.project_slug}}-redis
        command: redis-server --requirepass dev
        volumes:
            - 'redis-data:/data'
